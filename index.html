<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timer & Stopwatch App</title>
  <link rel="icon" type="image/jpeg" href="img/timer-icon.jpg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="timer-panel" aria-labelledby="app-title">
      <header class="app-header">
        <div class="title-group">
          <img class="app-icon" src="img/timer-icon.jpg" alt="" width="48" height="48">
          <div>
            <p class="eyebrow">Time Tools</p>
            <h1 id="app-title">タイマー</h1>
          </div>
        </div>
        <span class="status" id="statusText">待機中</span>
      </header>

      <div class="mode-tabs" role="tablist" aria-label="機能切り替え">
        <button class="mode-tab active" id="timerTab" type="button" data-mode="timer" role="tab" aria-selected="true">タイマー</button>
        <button class="mode-tab" id="stopwatchTab" type="button" data-mode="stopwatch" role="tab" aria-selected="false">ストップウォッチ</button>
      </div>

      <div class="timer-face" aria-live="polite">
        <svg class="progress-ring" viewBox="0 0 240 240" role="img" aria-label="時間の進行状況">
          <circle class="ring-track" cx="120" cy="120" r="106"></circle>
          <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="106"></circle>
        </svg>
        <div class="time-display" id="timeDisplay">25:00</div>
      </div>

      <div class="timer-settings" id="timerSettings">
        <div class="preset-row" aria-label="プリセット">
          <button class="preset" type="button" data-minutes="5">5分</button>
          <button class="preset" type="button" data-minutes="10">10分</button>
          <button class="preset active" type="button" data-minutes="25">25分</button>
          <button class="preset" type="button" data-minutes="50">50分</button>
        </div>

        <form class="custom-time" id="customTimeForm">
          <label>
            <span>分</span>
            <input id="minutesInput" type="number" min="0" max="999" value="25" inputmode="numeric">
          </label>
          <label>
            <span>秒</span>
            <input id="secondsInput" type="number" min="0" max="59" value="0" inputmode="numeric">
          </label>
          <button type="submit">設定</button>
        </form>
      </div>

      <div class="control-row">
        <button class="control primary" id="startPauseButton" type="button">開始</button>
        <button class="control" id="lapButton" type="button" hidden>ラップ</button>
        <button class="control" id="resetButton" type="button">リセット</button>
      </div>

      <ol class="lap-list" id="lapList" aria-label="ラップタイム"></ol>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
